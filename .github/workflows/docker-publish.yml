# Construye la imagen (Next static export + nginx) y la sube a Docker Hub.
# Secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
# Imagen: DOCKERHUB_USERNAME/nist-csf-maturity-assessment

name: Docker Hub publish

on:
  push:
    branches: [main]
    paths:
      - "anci-advisor/**"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_BASE: ${{ secrets.DOCKERHUB_USERNAME }}/nist-csf-maturity-assessment

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./anci-advisor
          file: ./anci-advisor/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_SITE_URL=https://nistcsf.uptlibre.pe
          cache-from: type=gha
          cache-to: type=gha,mode=max
